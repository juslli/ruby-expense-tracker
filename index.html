<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <main class="container">
    <header class="topbar">
      <div>
        <p class="tag">Controle Financeiro</p>
        <h1>Expense Tracker Pro</h1>
        <p class="subtitle">Organize suas entradas e saídas de forma simples.</p>
      </div>
    </header>

    <section class="summary">
      <div class="card balance-card">
        <p class="label">Saldo Atual</p>
        <h2 id="balance">R$ 0,00</h2>
      </div>

      <div class="mini-cards">
        <div class="card income">
          <p class="label">Entradas</p>
          <h3 id="money-plus">R$ 0,00</h3>
        </div>

        <div class="card expense">
          <p class="label">Saídas</p>
          <h3 id="money-minus">R$ 0,00</h3>
        </div>
      </div>
    </section>

    <section class="content-grid">
      <div class="card form-card">
        <h3>Nova Transação</h3>
        <form id="form">
          <div class="form-control">
            <label for="text">Descrição</label>
            <input type="text" id="text" placeholder="Ex: Salário, Mercado, Internet" />
          </div>

          <div class="form-control">
            <label for="amount">Valor</label>
            <input type="number" id="amount" placeholder="Use positivo para entrada e negativo para saída" />
            <small>Ex: 1500 ou -89.90</small>
          </div>

          <button type="submit" class="btn">Adicionar transação</button>
        </form>
      </div>

      <div class="card history-card">
        <div class="history-header">
          <h3>Histórico</h3>

          <div class="history-actions">
            <select id="filter">
              <option value="all">Todas</option>
              <option value="income">Entradas</option>
              <option value="expense">Saídas</option>
            </select>

            <button id="clear-all" class="clear-btn">Limpar tudo</button>
          </div>
        </div>

        <ul id="list" class="list"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
